<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출산준비물 플래너 — 맘스홀릭 스타일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f4f6;
  --card:#ffffff;
  --blue:#3182f6;
  --blue-light:#e8f1ff;
  --orange:#ff8c00;
  --orange-light:#fff3e0;
  --text:#191f28;
  --text2:#6b7684;
  --text3:#b0b8c1;
  --border:#e5e8eb;
  --radius:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --shadow-md:0 4px 24px rgba(0,0,0,0.10);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ── HEADER ── */
.header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 24px}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:16px;height:60px}
.logo{font-size:17px;font-weight:700;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px}
.logo-badge{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px}
.progress-wrap{flex:1;min-width:0;max-width:320px}
.progress-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between;gap:8px}
.progress-label span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-bar{height:6px;background:#e5e8eb;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:99px;transition:width .4s ease}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1a6fe8}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px}

/* ── LAYOUT ── */
.main{max-width:1280px;margin:0 auto;padding:24px 24px 80px;display:grid;grid-template-columns:320px 1fr;gap:24px;align-items:start}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:80px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

/* Budget Board */
.budget-board{padding:20px}
.budget-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px}
.budget-total{font-size:28px;font-weight:900;color:var(--text);line-height:1}
.budget-total span{font-size:14px;font-weight:500;color:var(--text2)}
.budget-save{margin-top:8px;display:flex;align-items:center;gap:6px;background:var(--orange-light);border-radius:10px;padding:8px 12px}
.budget-save-label{font-size:12px;color:var(--orange);font-weight:600}
.budget-save-amt{font-size:16px;font-weight:700;color:var(--orange);margin-left:auto}
.budget-bars{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.budget-bar-row{display:flex;flex-direction:column;gap:4px}
.budget-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.budget-bar-track{height:8px;background:#e5e8eb;border-radius:99px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.fill-blue{background:var(--blue)}
.fill-green{background:#22c55e}

/* Floating bottom button */
.fab-wrap{position:fixed;bottom:0;left:0;right:0;z-index:90;padding:12px 20px 20px;background:linear-gradient(to top,rgba(242,244,246,1) 60%,rgba(242,244,246,0));pointer-events:none}
.fab-btn{pointer-events:all;width:100%;max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(49,130,246,.4);transition:all .15s}
.fab-btn:hover{background:#1a6fe8;transform:translateY(-1px)}
@media(min-width:901px){.fab-wrap{display:none}}

/* Accordion */
.accordion{border-top:1px solid var(--border)}
.accordion-item{border-bottom:1px solid var(--border)}
.accordion-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;background:#fff;transition:background .1s}
.accordion-head:hover{background:var(--bg)}
.accordion-head-left{display:flex;align-items:center;gap:10px}
.accordion-q-num{width:22px;height:22px;background:var(--blue-light);color:var(--blue);border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accordion-q-text{font-size:13px;font-weight:600}
.accordion-q-check{font-size:11px;color:var(--blue);font-weight:600;margin-left:4px}
.accordion-arrow{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.accordion-arrow.open{transform:rotate(180deg)}
.accordion-body{padding:0 20px 16px;display:none}
.accordion-body.open{display:block}
.q-options{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.q-opt{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;background:#fff}
.q-opt:hover{border-color:var(--blue);color:var(--blue)}
.q-opt.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:700}
.q-hint{font-size:11px;color:var(--text3);margin-top:6px}

/* ── RIGHT ── */
.right-area{display:flex;flex-direction:column;gap:16px}
.category-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:#fff;transition:all .15s;display:flex;align-items:center;gap:4px}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-count{font-size:10px;opacity:.7}

.items-grid{display:flex;flex-direction:column;gap:12px}

/* Item Card */
.item-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s}
.item-card:hover{box-shadow:var(--shadow-md)}
.item-card.excluded{opacity:.45}
.item-card.conditional-hidden{display:none}
.item-card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.item-cat-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.cat-sleep{background:#e0f2fe;color:#0369a1}
.cat-feeding{background:#fce7f3;color:#9d174d}
.cat-diaper{background:#ecfdf5;color:#065f46}
.cat-outing{background:#fff7ed;color:#9a3412}
.cat-bath{background:#f5f3ff;color:#5b21b6}
.cat-play{background:#fffbeb;color:#92400e}
.cat-clothes{background:#fdf4ff;color:#7e22ce}
.item-name{font-size:15px;font-weight:700;margin-left:auto;flex:1;padding:0 10px}
.item-exclude-btn{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);transition:all .15s}
.item-exclude-btn:hover{border-color:#ef4444;color:#ef4444}
.item-exclude-btn.restore{border-color:var(--blue);color:var(--blue)}
.item-exclude-btn.restore:hover{background:var(--blue-light)}

.item-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 14px}
.item-opt{border:2px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;position:relative}
.item-opt:hover{border-color:var(--blue)}
.item-opt.selected-steady{border-color:var(--blue);background:var(--blue-light)}
.item-opt.selected-value{border-color:var(--orange);background:var(--orange-light)}
.item-opt-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;margin-bottom:6px}
.badge-steady{background:var(--blue);color:#fff}
.badge-value{background:var(--orange);color:#fff}
.item-opt-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4}
.item-opt-brand{font-size:11px;color:var(--text2);margin-top:2px}
.item-opt-price{font-size:14px;font-weight:700;color:var(--text);margin-top:6px}
.item-opt-save{font-size:11px;color:#22c55e;font-weight:600;margin-top:2px}
.item-opt-review{font-size:10px;color:var(--text3);margin-top:3px}
.item-opt-coupang{margin-top:8px}
.coupang-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text2);border:1px solid var(--border);padding:3px 8px;border-radius:6px;text-decoration:none;cursor:pointer;background:#fff;transition:all .15s}
.coupang-btn:hover{border-color:var(--orange);color:var(--orange)}
.item-opt-check{position:absolute;top:10px;right:10px;font-size:16px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state-icon{font-size:48px;margin-bottom:12px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;width:100%;max-width:640px;max-height:92vh;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;margin:0 auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:#e5e8eb;border-radius:99px;margin:12px auto 0}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:99px;background:var(--bg);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:#e5e8eb}
.modal-body{overflow-y:auto;padding:20px;flex:1}

/* Modal stats */
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg);border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;color:var(--text)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}

/* Purchase progress */
.purchase-progress{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:20px}
.purchase-progress-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between}
.purchase-bar{height:10px;background:#e5e8eb;border-radius:99px;overflow:hidden}
.purchase-fill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);border-radius:99px;transition:width .4s}

/* Modal items */
.modal-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.modal-item:last-child{border-bottom:none}
.modal-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px}
.modal-check.checked{background:var(--blue);border-color:var(--blue);color:#fff}
.modal-item-info{flex:1;min-width:0}
.modal-item-name{font-size:13px;font-weight:600}
.modal-item-sub{font-size:11px;color:var(--text2);margin-top:1px}
.modal-item-price{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap}
.modal-item-buy{padding:5px 12px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.modal-item-buy:hover{background:#e67e00}

/* Share buttons */
.share-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.share-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px}
.share-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.share-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;background:#fff;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s}
.share-btn:hover{border-color:var(--blue);color:var(--blue)}
.share-btn-icon{font-size:22px}
.share-img-btn{background:var(--bg);border-color:var(--border);color:var(--text2)}

/* ── ADMIN DASHBOARD ── */
.admin-overlay{position:fixed;inset:0;background:#0f172a;z-index:300;display:none;flex-direction:column;overflow-y:auto}
.admin-overlay.open{display:flex}
.admin-inner{max-width:960px;margin:0 auto;padding:32px 24px;width:100%}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.admin-title{font-size:22px;font-weight:700;color:#f1f5f9;display:flex;align-items:center;gap:10px}
.admin-close{padding:8px 18px;background:#334155;color:#94a3b8;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
.admin-close:hover{background:#475569;color:#f1f5f9}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.admin-stat{background:#1e293b;border-radius:14px;padding:20px}
.admin-stat-val{font-size:28px;font-weight:900;color:#f1f5f9}
.admin-stat-label{font-size:12px;color:#64748b;margin-top:4px}
.admin-section-title{font-size:15px;font-weight:700;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.admin-table-wrap{background:#1e293b;border-radius:14px;overflow:hidden;margin-bottom:24px}
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{background:#0f172a;color:#64748b;font-size:12px;font-weight:600;padding:10px 16px;text-align:left;border-bottom:1px solid #334155}
.admin-table td{padding:10px 16px;font-size:12px;color:#cbd5e1;border-bottom:1px solid #1e293b}
.admin-table tr:last-child td{border-bottom:none}
.admin-table input{background:#334155;border:1px solid #475569;border-radius:6px;padding:4px 8px;font-size:11px;color:#f1f5f9;width:100%;font-family:inherit}
.admin-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.admin-btn-save{background:#3182f6;color:#fff}
.admin-btn-csv{background:#334155;color:#94a3b8}
.admin-btn-csv:hover{background:#475569;color:#f1f5f9}
.admin-actions{display:flex;gap:8px;margin-bottom:24px}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#191f28;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .main{grid-template-columns:1fr;padding:16px 16px 80px}
  .sidebar{position:static}
  .modal-box{max-width:100%;border-radius:20px 20px 0 0}
}
@media(max-width:600px){
  .header-inner{gap:10px}
  .logo-badge{display:none}
  .progress-wrap{display:none}
  .budget-total{font-size:22px}
  .modal-stats{grid-template-columns:repeat(3,1fr)}
  .stat-val{font-size:16px}
  .admin-stats{grid-template-columns:1fr}
  .share-btns{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      👶 출산준비물 플래너
      <span class="logo-badge">Beta</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">진행도 0%</span>
        <span id="progressCount">0 / 25개</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openModal()">📋 최종 목록</button>
      <button class="btn btn-ghost btn-sm" onclick="openAdmin()">⚙️ 관리자</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Budget Board -->
    <div class="card budget-board">
      <div class="budget-title">💰 현재 예상 비용</div>
      <div class="budget-total"><span id="currentTotal">0</span><span>원</span></div>
      <div class="budget-save">
        <span class="budget-save-label">✨ 절약 금액</span>
        <span class="budget-save-amt" id="saveAmount">0원</span>
      </div>
      <div class="budget-bars">
        <div class="budget-bar-row">
          <div class="budget-bar-label"><span>👑 스테디셀러 기준</span><span id="steadyTotalLabel">0원</span></div>
          <div class="budget-bar-track"><div class="budget-bar-fill fill-blue" id="steadyBar" style="width:100%"></div></div>
        </div>
        <div class="budget-bar-row">
          <div class="budget-bar-label"><span>💡 내 선택 기준</span><span id="myTotalLabel">0원</span></div>
          <div class="budget-bar-track"><div class="budget-bar-fill fill-green" id="myBar" style="width:100%"></div></div>
        </div>
      </div>
    </div>

    <!-- Q&A Accordion -->
    <div class="card" style="overflow:visible">
      <div style="padding:14px 20px 2px;font-size:13px;font-weight:700">🎯 내 상황에 맞게 최적화</div>
      <div class="accordion" id="accordionWrap"></div>
    </div>
  </aside>

  <!-- RIGHT -->
  <div class="right-area">
    <div class="category-chips" id="categoryChips"></div>
    <div class="items-grid" id="itemsGrid"></div>
  </div>
</div>

<!-- FINAL MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">📋 최종 준비물 목록</div>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-inner">
    <div class="admin-header">
      <div class="admin-title">⚙️ 관리자 대시보드</div>
      <button class="admin-close" onclick="closeAdmin()">✕ 닫기</button>
    </div>
    <div class="admin-stats" id="adminStats"></div>
    <div class="admin-section-title">🔗 쿠팡 파트너스 링크 관리</div>
    <div class="admin-actions">
      <button class="admin-btn admin-btn-save" onclick="saveAdminLinks()">💾 저장</button>
      <button class="admin-btn admin-btn-csv" onclick="exportCSV()">📥 CSV 내보내기</button>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table" id="adminTable">
        <thead><tr>
          <th>카테고리</th><th>타입</th><th>상품명 (수정 가능)</th><th>쿠팡 URL</th>
        </tr></thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- FLOATING BOTTOM BUTTON (모바일) -->
<div class="fab-wrap">
  <button class="fab-btn" onclick="openModal()">📋 최종 목록 보기</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── DATA ──
var ITEMS = [
  {id:'crib',name:'신생아 침대',cat:'sleep',
   steady:{name:'스토케 슬리피 베이비베드',brand:'Stokke',price:389000,review:'★4.8 (맘카페 압도적 1위)',tip:'성장에 따라 확장 가능'},

// ── STATE ──
var state = {
  selections: {},   // itemId -> 'steady'|'value'
  excluded: {},     // itemId -> true
  answers: {},      // questionId -> answer value
  activeCategory: 'all',
  purchased: {},    // itemId -> true
  coupangLinks: {}, // itemId_type -> url
  adminStats: {visitors:0,clicks:0,saves:0}
};

// ── INIT ──
function init() {
  loadFromStorage();
  // Default all items to steady
  ITEMS.forEach(function(item) {
    if (!state.selections[item.id]) state.selections[item.id] = 'steady';
  });
  renderAll();
  trackVisit();
}

function loadFromStorage() {
  try {
    var s = localStorage.getItem('planner_state');
    if (s) {
      var parsed = JSON.parse(s);
      state.selections = parsed.selections || {};
      state.excluded = parsed.excluded || {};
      state.answers = parsed.answers || {};
      state.purchased = parsed.purchased || {};
    }
    var links = localStorage.getItem('planner_links');
    if (links) state.coupangLinks = JSON.parse(links);
    var stats = localStorage.getItem('planner_stats');
    if (stats) state.adminStats = JSON.parse(stats);
  } catch(e) {}
}

function saveToStorage() {
  try {
    localStorage.setItem('planner_state', JSON.stringify({
      selections: state.selections,
      excluded: state.excluded,
      answers: state.answers,
      purchased: state.purchased
    }));
    state.adminStats.saves = (state.adminStats.saves || 0) + 1;
    localStorage.setItem('planner_stats', JSON.stringify(state.adminStats));
  } catch(e) {}
}

function trackVisit() {
  try {
    state.adminStats.visitors = (state.adminStats.visitors || 0) + 1;
    localStorage.setItem('planner_stats', JSON.stringify(state.adminStats));
  } catch(e) {}
}

function trackClick(itemId, type) {
  try {
    state.adminStats.clicks = (state.adminStats.clicks || 0) + 1;
    localStorage.setItem('planner_stats', JSON.stringify(state.adminStats));
  } catch(e) {}
}

// ── CONDITIONAL LOGIC ──
function isItemVisible(item) {
  if (!item.conditional) return true;
  if (item.conditional === 'breastfeed') {
    var a = state.answers['feeding_type'];
    if (!a) return true;
    return a === 'breastfeed' || a === 'mixed';
  }
  if (item.conditional === 'winter') {
    var b = state.answers['season'];
    if (!b) return true;
    return b === 'winter';
  }
  if (item.conditional === 'outing_active') {
    var c = state.answers['outing'];
    if (!c) return true;
    return c === 'active' || c === 'medium';
  }
  if (item.conditional === 'car') {
    var d = state.answers['car'];
    if (!d) return true;
    return d === 'yes';
  }
  return true;
}

// ── PRICE CALC ──
function calcTotals() {
  var steadyTotal = 0;
  var myTotal = 0;
  var activeItems = 0;
  ITEMS.forEach(function(item) {
    if (!isItemVisible(item)) return;
    if (state.excluded[item.id]) return;
    activeItems++;
    steadyTotal += item.steady.price;
    var sel = state.selections[item.id] || 'steady';
    if (sel === 'steady') {
      myTotal += item.steady.price;
    } else {
      myTotal += item.value.price;
    }
  });
  return {steadyTotal: steadyTotal, myTotal: myTotal, save: steadyTotal - myTotal, activeItems: activeItems};
}

// ── FORMAT ──
function fmtPrice(n) {
  if (n >= 10000) {
    var man = Math.floor(n / 10000);
    var rem = n % 10000;
    if (rem === 0) return man + '만원';
    return man + '만 ' + rem.toLocaleString() + '원';
  }
  return n.toLocaleString() + '원';
}

// ── RENDER ALL ──
function renderAll() {
  renderBudget();
  renderAccordion();
  renderCategoryChips();
  renderItems();
  renderProgress();
}

// ── BUDGET ──
function renderBudget() {
  var t = calcTotals();
  document.getElementById('currentTotal').textContent = fmtPrice(t.myTotal);
  document.getElementById('saveAmount').textContent = t.save > 0 ? fmtPrice(t.save) : '0원';
  document.getElementById('steadyTotalLabel').textContent = fmtPrice(t.steadyTotal);
  document.getElementById('myTotalLabel').textContent = fmtPrice(t.myTotal);
  // bars
  var pct = t.steadyTotal > 0 ? Math.round(t.myTotal / t.steadyTotal * 100) : 100;
  document.getElementById('steadyBar').style.width = '100%';
  document.getElementById('myBar').style.width = pct + '%';
}

// ── PROGRESS ──
function renderProgress() {
  var total = ITEMS.filter(function(i) { return isItemVisible(i); }).length;
  var done = ITEMS.filter(function(i) { return isItemVisible(i) && state.purchased[i.id]; }).length;
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = '구매 완료 ' + pct + '%';
  document.getElementById('progressCount').textContent = done + ' / ' + total + '개';
}

// ── ACCORDION ──
function renderAccordion() {
  var wrap = document.getElementById('accordionWrap');
  var html = '';
  QUESTIONS.forEach(function(q, idx) {
    var ans = state.answers[q.id];
    var ansLabel = '';
    if (ans) {
      var found = q.options.find(function(o) { return o.v === ans; });
      if (found) ansLabel = '<span class="accordion-q-check">✔ ' + found.l + '</span>';
    }
    var bodyClass = 'accordion-body';
    html += '<div class="accordion-item">';
    html += '<div class="accordion-head" onclick="toggleAccordion(' + idx + ')">';
    html += '<div class="accordion-head-left">';
    html += '<span class="accordion-q-num">' + (idx + 1) + '</span>';
    html += '<span class="accordion-q-text">' + q.label + '</span>' + ansLabel;
    html += '</div>';
    html += '<span class="accordion-arrow" id="arrow' + idx + '">▼</span>';
    html += '</div>';
    html += '<div class="' + bodyClass + '" id="abody' + idx + '">';
    html += '<div class="q-options">';
    q.options.forEach(function(opt) {
      var sel = state.answers[q.id] === opt.v ? ' selected' : '';
      html += '<div class="q-opt' + sel + '" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.v + '\',' + idx + ')">' + opt.l + '</div>';
    });
    html += '</div>';
    if (q.hint) html += '<div class="q-hint">💡 ' + q.hint + '</div>';
    html += '</div></div>';
  });
  wrap.innerHTML = html;
}

function toggleAccordion(idx) {
  var body = document.getElementById('abody' + idx);
  var arrow = document.getElementById('arrow' + idx);
  var isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function selectAnswer(qid, val, idx) {
  state.answers[qid] = val;
  saveToStorage();
  renderAll();
}

// ── CATEGORY CHIPS ──
function renderCategoryChips() {
  var wrap = document.getElementById('categoryChips');
  var html = '';
  CATEGORIES.forEach(function(cat) {
    var count = 0;
    if (cat.id === 'all') {
      count = ITEMS.filter(function(i) { return isItemVisible(i); }).length;
    } else {
      count = ITEMS.filter(function(i) { return i.cat === cat.id && isItemVisible(i); }).length;
    }
    var active = state.activeCategory === cat.id ? ' active' : '';
    html += '<div class="chip' + active + '" onclick="setCategory(\'' + cat.id + '\')">';
    html += cat.emoji + ' ' + cat.label + ' <span class="chip-count">(' + count + ')</span>';
    html += '</div>';
  });
  wrap.innerHTML = html;
}

function setCategory(catId) {
  state.activeCategory = catId;
  renderCategoryChips();
  renderItems();
}

// ── ITEMS ──
function renderItems() {
  var grid = document.getElementById('itemsGrid');
  var filtered = ITEMS.filter(function(item) {
    if (!isItemVisible(item)) return false;
    if (state.activeCategory !== 'all' && item.cat !== state.activeCategory) return false;
    return true;
  });
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div>조건에 맞는 아이템이 없어요</div></div>';
    return;
  }
  var html = '';
  filtered.forEach(function(item) {
    html += buildItemCard(item);
  });
  grid.innerHTML = html;
}

function getCatClass(cat) {
  return 'cat-' + cat;
}

function getCatLabel(cat) {
  var found = CATEGORIES.find(function(c) { return c.id === cat; });
  return found ? found.emoji + ' ' + found.label : cat;
}

function buildItemCard(item) {
  var excluded = !!state.excluded[item.id];
  var sel = state.selections[item.id] || 'steady';
  var excludeLabel = excluded ? '↩ 복원' : '− 제외';
  var excludeClass = excluded ? 'item-exclude-btn restore' : 'item-exclude-btn';
  var saveAmt = item.steady.price - item.value.price;

  var steadyClass = 'item-opt' + (sel === 'steady' ? ' selected-steady' : '');
  var valueClass = 'item-opt' + (sel === 'value' ? ' selected-value' : '');

  var steadyCheck = sel === 'steady' ? '<div class="item-opt-check">✅</div>' : '';
  var valueCheck = sel === 'value' ? '<div class="item-opt-check">✅</div>' : '';

  var steadyLink = state.coupangLinks[item.id + '_steady'] || '';
  var valueLink = state.coupangLinks[item.id + '_value'] || '';
  var steadyDisplayName = state.coupangLinks[item.id + '_steady_name'] || item.steady.name;
  var valueDisplayName = state.coupangLinks[item.id + '_value_name'] || item.value.name;
  var steadyCoupang = steadyLink ? '<div class="item-opt-coupang"><a href="' + steadyLink + '" target="_blank" class="coupang-btn" onclick="trackClick(\'' + item.id + '\',\'steady\')">🛒 쿠팡 구매</a></div>' : '<div class="item-opt-coupang"><span class="coupang-btn" style="cursor:default;opacity:.5">🔗 링크 미설정</span></div>';
  var valueCoupang = valueLink ? '<div class="item-opt-coupang"><a href="' + valueLink + '" target="_blank" class="coupang-btn" onclick="trackClick(\'' + item.id + '\',\'value\')">🛒 쿠팡 구매</a></div>' : '<div class="item-opt-coupang"><span class="coupang-btn" style="cursor:default;opacity:.5">🔗 링크 미설정</span></div>';

  var html = '<div class="item-card' + (excluded ? ' excluded' : '') + '" id="card-' + item.id + '">';
  html += '<div class="item-card-head">';
  html += '<span class="item-cat-badge ' + getCatClass(item.cat) + '">' + getCatLabel(item.cat) + '</span>';
  html += '<span class="item-name">' + item.name + '</span>';
  if (item.conditional) html += '<span style="font-size:11px;color:#ff8c00;margin-right:8px">📌 조건부</span>';
  html += '<button class="' + excludeClass + '" onclick="toggleExclude(\'' + item.id + '\')">' + excludeLabel + '</button>';
  html += '</div>';

  html += '<div class="item-options">';
  // Steady (left)
  html += '<div class="' + steadyClass + '" onclick="selectOption(\'' + item.id + '\',\'steady\')" id="opt-' + item.id + '-steady">';
  html += steadyCheck;
  html += '<div class="item-opt-badge badge-steady">👑 스테디셀러</div>';
  html += '<div class="item-opt-name">' + steadyDisplayName + '</div>';
  html += '<div class="item-opt-brand">' + item.steady.brand + '</div>';
  html += '<div class="item-opt-price">' + fmtPrice(item.steady.price) + '</div>';
  html += '<div class="item-opt-review">' + item.steady.review + '</div>';
  html += '<div class="item-opt-review" style="color:var(--text2)">' + item.steady.tip + '</div>';
  html += steadyCoupang;
  html += '</div>';

  // Value (right)
  html += '<div class="' + valueClass + '" onclick="selectOption(\'' + item.id + '\',\'value\')" id="opt-' + item.id + '-value">';
  html += valueCheck;
  html += '<div class="item-opt-badge badge-value">💡 가성비</div>';
  html += '<div class="item-opt-name">' + valueDisplayName + '</div>';
  html += '<div class="item-opt-brand">' + item.value.brand + '</div>';
  html += '<div class="item-opt-price">' + fmtPrice(item.value.price) + '</div>';
  html += '<div class="item-opt-save">👑 대비 ' + fmtPrice(saveAmt) + ' 절약</div>';
  html += '<div class="item-opt-review">' + item.value.review + '</div>';
  html += '<div class="item-opt-review" style="color:var(--text2)">' + item.value.tip + '</div>';
  html += valueCoupang;
  html += '</div>';

  html += '</div></div>';
  return html;
}

function selectOption(itemId, type) {
  if (state.excluded[itemId]) return;
  state.selections[itemId] = type;
  saveToStorage();
  renderBudget();
  // Re-render just the card efficiently
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  if (item) {
    var card = document.getElementById('card-' + itemId);
    if (card) card.outerHTML = buildItemCard(item);
  }
}

function toggleExclude(itemId) {
  state.excluded[itemId] = !state.excluded[itemId];
  saveToStorage();
  renderBudget();
  renderProgress();
  renderCategoryChips();
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  if (item) {
    var card = document.getElementById('card-' + itemId);
    if (card) card.outerHTML = buildItemCard(item);
  }
}

// ── MODAL ──
function openModal() {
  var overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  renderModal();
}

function closeModal() {
  var overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
}

document.getElementById('modalCloseBtn').addEventListener('click', function() {
  closeModal();
});

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModal();
  }
});

function renderModal() {
  var t = calcTotals();
  var activeItems = ITEMS.filter(function(i) { return isItemVisible(i) && !state.excluded[i.id]; });
  var purchasedCount = activeItems.filter(function(i) { return state.purchased[i.id]; }).length;
  var purchasePct = activeItems.length > 0 ? Math.round(purchasedCount / activeItems.length * 100) : 0;

  var html = '';

  // Stats
  html += '<div class="modal-stats">';
  html += '<div class="stat-card"><div class="stat-val">' + activeItems.length + '</div><div class="stat-label">총 아이템</div></div>';
  html += '<div class="stat-card"><div class="stat-val" style="font-size:16px">' + fmtPrice(t.myTotal) + '</div><div class="stat-label">최종 예산</div></div>';
  html += '<div class="stat-card"><div class="stat-val" style="color:var(--orange)">' + fmtPrice(t.save) + '</div><div class="stat-label">절약 금액</div></div>';
  html += '</div>';

  // Purchase progress
  html += '<div class="purchase-progress">';
  html += '<div class="purchase-progress-label"><span>🛒 구매 진행률</span><span>' + purchasedCount + '/' + activeItems.length + '개 완료</span></div>';
  html += '<div class="purchase-bar"><div class="purchase-fill" style="width:' + purchasePct + '%"></div></div>';
  html += '</div>';

  // Items
  activeItems.forEach(function(item) {
    var sel = state.selections[item.id] || 'steady';
    var opt = sel === 'steady' ? item.steady : item.value;
    var isPurchased = !!state.purchased[item.id];
    var link = state.coupangLinks[item.id + '_' + sel] || '';
    html += '<div class="modal-item">';
    html += '<div class="modal-check ' + (isPurchased ? 'checked' : '') + '" onclick="togglePurchased(\'' + item.id + '\')">' + (isPurchased ? '✓' : '') + '</div>';
    html += '<div class="modal-item-info">';
    html += '<div class="modal-item-name">' + item.name + '</div>';
    html += '<div class="modal-item-sub">' + (sel === 'steady' ? '👑 ' : '💡 ') + opt.name + ' · ' + opt.brand + '</div>';
    html += '</div>';
    html += '<div class="modal-item-price">' + fmtPrice(opt.price) + '</div>';
    if (link) {
      html += '<a href="' + link + '" target="_blank" class="modal-item-buy">🛒 구매</a>';
    } else {
      html += '<button class="modal-item-buy" style="opacity:.4;cursor:default">🛒 구매</button>';
    }
    html += '</div>';
  });

  // Share
  html += '<div class="share-section">';
  html += '<div class="share-title">📤 목록 공유하기</div>';
  html += '<div class="share-btns">';
  html += '<div class="share-btn" onclick="shareKakao()"><div class="share-btn-icon">💬</div>카카오톡</div>';
  html += '<div class="share-btn" onclick="shareSMS()"><div class="share-btn-icon">📱</div>문자</div>';
  html += '<div class="share-btn" onclick="shareInsta()"><div class="share-btn-icon">📸</div>인스타</div>';
  html += '<div class="share-btn" onclick="copyLink()"><div class="share-btn-icon">🔗</div>링크복사</div>';
  html += '</div>';
  html += '<div style="margin-top:12px">';
  html += '<button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="showSaveHint()">📷 이미지 저장</button>';
  html += '</div>';
  html += '</div>';

  document.getElementById('modalBody').innerHTML = html;
}

function togglePurchased(itemId) {
  state.purchased[itemId] = !state.purchased[itemId];
  saveToStorage();
  renderModal();
  renderProgress();
}

// ── SHARE ──
function getShareText() {
  var t = calcTotals();
  var lines = ['👶 출산준비물 목록 (총 ' + fmtPrice(t.myTotal) + ' | 절약 ' + fmtPrice(t.save) + ')'];
  ITEMS.forEach(function(item) {
    if (!isItemVisible(item) || state.excluded[item.id]) return;
    var sel = state.selections[item.id] || 'steady';
    var opt = sel === 'steady' ? item.steady : item.value;
    lines.push('• ' + item.name + ': ' + opt.name + ' ' + fmtPrice(opt.price));
  });
  lines.push('\n출산준비물 플래너에서 만들었어요 🎀');
  return lines.join('\n');
}

function shareKakao() {
  var text = getShareText();
  if (navigator.share) {
    navigator.share({title: '출산준비물 목록', text: text}).catch(function() {});
  } else {
    copyTextToClipboard(text);
    showToast('📋 텍스트가 복사됐어요! 카카오톡에 붙여넣기 하세요');
  }
}

function shareSMS() {
  var text = encodeURIComponent(getShareText());
  window.open('sms:?body=' + text);
}

function shareInsta() {
  copyTextToClipboard(getShareText());
  showToast('📋 복사됐어요! 인스타그램 스토리에 붙여넣기 하세요');
}

function copyLink() {
  copyTextToClipboard(window.location.href);
  showToast('🔗 링크가 복사됐어요!');
}

function copyTextToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed';
  el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

function showSaveHint() {
  showToast('📱 꾹 눌러서 스크린샷으로 저장해주세요 (전원+볼륨 다운)');
}

// ── TOAST ──
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── ADMIN ──
function openAdmin() {
  var overlay = document.getElementById('adminOverlay');
  overlay.classList.add('open');
  renderAdminStats();
  renderAdminTable();
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
}

function renderAdminStats() {
  var s = state.adminStats;
  var html = '';
  html += '<div class="admin-stat"><div class="admin-stat-val">' + (s.visitors || 0) + '</div><div class="admin-stat-label">총 방문자</div></div>';
  html += '<div class="admin-stat"><div class="admin-stat-val">' + (s.clicks || 0) + '</div><div class="admin-stat-label">쿠팡 클릭</div></div>';
  html += '<div class="admin-stat"><div class="admin-stat-val">' + (s.saves || 0) + '</div><div class="admin-stat-label">저장 횟수</div></div>';
  document.getElementById('adminStats').innerHTML = html;
}

function renderAdminTable() {
  var html = '';
  ITEMS.forEach(function(item) {
    var sLink = state.coupangLinks[item.id + '_steady'] || '';
    var vLink = state.coupangLinks[item.id + '_value'] || '';
    var sSavedName = state.coupangLinks[item.id + '_steady_name'] || item.steady.name;
    var vSavedName = state.coupangLinks[item.id + '_value_name'] || item.value.name;
    html += '<tr>';
    html += '<td style="font-weight:600;color:#f1f5f9">' + item.name + '</td>';
    html += '<td style="color:#60a5fa;white-space:nowrap">👑 스테디</td>';
    html += '<td><input type="text" value="' + escAttr(sSavedName) + '" id="name-' + item.id + '-steady" placeholder="상품명 직접 입력"></td>';
    html += '<td><input type="text" value="' + escAttr(sLink) + '" id="link-' + item.id + '-steady" placeholder="https://link.coupang.com/..."></td>';
    html += '</tr>';
    html += '<tr>';
    html += '<td></td>';
    html += '<td style="color:#fb923c;white-space:nowrap">💡 가성비</td>';
    html += '<td><input type="text" value="' + escAttr(vSavedName) + '" id="name-' + item.id + '-value" placeholder="상품명 직접 입력"></td>';
    html += '<td><input type="text" value="' + escAttr(vLink) + '" id="link-' + item.id + '-value" placeholder="https://link.coupang.com/..."></td>';
    html += '</tr>';
  });
  document.getElementById('adminTableBody').innerHTML = html;
}

function escAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function saveAdminLinks() {
  ITEMS.forEach(function(item) {
    var sInput = document.getElementById('link-' + item.id + '-steady');
    var vInput = document.getElementById('link-' + item.id + '-value');
    var sNameInput = document.getElementById('name-' + item.id + '-steady');
    var vNameInput = document.getElementById('name-' + item.id + '-value');
    if (sInput) state.coupangLinks[item.id + '_steady'] = sInput.value.trim();
    if (vInput) state.coupangLinks[item.id + '_value'] = vInput.value.trim();
    if (sNameInput && sNameInput.value.trim()) state.coupangLinks[item.id + '_steady_name'] = sNameInput.value.trim();
    if (vNameInput && vNameInput.value.trim()) state.coupangLinks[item.id + '_value_name'] = vNameInput.value.trim();
  });
  try {
    localStorage.setItem('planner_links', JSON.stringify(state.coupangLinks));
  } catch(e) {}
  renderItems();
  showToast('✅ 상품명과 링크가 저장됐어요!');
}

function exportCSV() {
  var rows = [['아이템','타입','상품명','브랜드','가격','쿠팡URL']];
  ITEMS.forEach(function(item) {
    var sLink = state.coupangLinks[item.id + '_steady'] || '';
    var vLink = state.coupangLinks[item.id + '_value'] || '';
    rows.push([item.name,'스테디',item.steady.name,item.steady.brand,item.steady.price,sLink]);
    rows.push([item.name,'가성비',item.value.name,item.value.brand,item.value.price,vLink]);
  });
  var csv = rows.map(function(r) { return r.map(function(c) { return '"' + String(c).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
  var blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'planner_links.csv';
  a.click();
  showToast('📥 CSV 파일이 다운로드됐어요!');
}

// ── START ──
init();
</script>
