<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출산준비물 플래너 — 맘스홀릭 스타일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f4f6;--card:#fff;
  --blue:#3182f6;--blue-light:#e8f1ff;
  --yellow:#f5b800;--yellow-light:#fffbeb;--yellow-border:#f5b800;
  --lime:#4caf50;--lime-light:#f1fdf2;--lime-border:#4caf50;
  --orange:#ff8c00;--orange-light:#fff3e0;
  --green:#22c55e;
  --text:#191f28;--text2:#6b7684;--text3:#b0b8c1;
  --border:#e5e8eb;--radius:16px;
  --shadow:0 2px 12px rgba(0,0,0,.06);--shadow-md:0 4px 24px rgba(0,0,0,.12);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 20px}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:12px;height:58px}
.logo{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.logo-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px}
.progress-wrap{flex:1;min-width:0;max-width:300px}
.progress-label{font-size:11px;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:#e5e8eb;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:99px;transition:width .4s}
.header-actions{display:flex;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1a6fe8}

/* LAYOUT */
.main{max-width:1280px;margin:0 auto;padding:20px 20px 100px;display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}

/* SIDEBAR */
.sidebar{position:sticky;top:76px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

/* Budget */
.budget-board{padding:18px}
.budget-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px}
.budget-total{font-size:26px;font-weight:900;color:var(--text);line-height:1}
.budget-save{margin-top:8px;display:flex;align-items:center;background:var(--orange-light);border-radius:10px;padding:8px 12px}
.budget-save-label{font-size:12px;color:var(--orange);font-weight:600}
.budget-save-amt{font-size:15px;font-weight:700;color:var(--orange);margin-left:auto}
.budget-bars{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.budget-bar-row{display:flex;flex-direction:column;gap:3px}
.budget-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.budget-bar-track{height:7px;background:#e5e8eb;border-radius:99px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:99px;transition:width .5s}
.fill-yellow{background:var(--yellow)}.fill-lime{background:var(--lime)}

/* Accordion */
.accordion{border-top:1px solid var(--border)}
.accordion-item{border-bottom:1px solid var(--border)}
.accordion-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none;transition:background .1s}
.accordion-head:hover{background:var(--bg)}
.accordion-head-left{display:flex;align-items:center;gap:8px}
.accordion-q-num{width:20px;height:20px;background:var(--blue-light);color:var(--blue);border-radius:5px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accordion-q-text{font-size:13px;font-weight:600}
.accordion-q-check{font-size:11px;color:var(--blue);font-weight:600;margin-left:4px}
.accordion-arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.accordion-arrow.open{transform:rotate(180deg)}
.accordion-body{padding:0 18px 14px;display:none}
.accordion-body.open{display:block}
.q-options{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.q-opt{padding:5px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s;background:#fff}
.q-opt:hover{border-color:var(--blue);color:var(--blue)}
.q-opt.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:700}
.q-hint{font-size:11px;color:var(--text3);margin-top:5px}

/* RIGHT */
.right-area{display:flex;flex-direction:column;gap:14px}
.category-chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 13px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:#fff;transition:all .15s}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-count{font-size:10px;opacity:.7}
.items-grid{display:flex;flex-direction:column;gap:14px}

/* ── ITEM CARD ── */
.item-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s}
.item-card:hover{box-shadow:var(--shadow-md)}
.item-card.excluded{opacity:.4}

.item-card-head{display:flex;align-items:center;padding:13px 15px 10px;gap:8px}
.item-cat-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;flex-shrink:0}
.cat-sleep{background:#e0f2fe;color:#0369a1}.cat-feeding{background:#fce7f3;color:#9d174d}
.cat-diaper{background:#ecfdf5;color:#065f46}.cat-outing{background:#fff7ed;color:#9a3412}
.cat-bath{background:#f5f3ff;color:#5b21b6}.cat-play{background:#fffbeb;color:#92400e}
.cat-clothes{background:#fdf4ff;color:#7e22ce}
.item-name-head{font-size:15px;font-weight:700;flex:1}
.item-exclude-btn{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);flex-shrink:0}
.item-exclude-btn:hover{border-color:#ef4444;color:#ef4444}
.item-exclude-btn.restore{border-color:var(--blue);color:var(--blue)}

/* 선택 버튼 영역 (기본 카드) */
.item-type-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 15px 15px}
.type-btn{padding:12px 8px;border-radius:12px;border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .15s;background:#fff;font-family:inherit}
.type-btn:hover{box-shadow:var(--shadow-md)}
.type-btn-icon{font-size:20px;display:block;margin-bottom:4px}
.type-btn-label{font-size:12px;font-weight:700;display:block;margin-bottom:2px}
.type-btn-sub{font-size:10px;color:var(--text2);display:block}

/* 스테디 = 노란색 */
.type-btn.steady-btn{border-color:var(--yellow);background:var(--yellow-light)}
.type-btn.steady-btn .type-btn-label{color:#92620a}
.type-btn.steady-btn:hover{background:#fef3c7;border-color:#d97706}
.type-btn.steady-selected{border-color:var(--yellow);background:var(--yellow);box-shadow:0 2px 12px rgba(245,184,0,.4)}
.type-btn.steady-selected .type-btn-label{color:#fff}
.type-btn.steady-selected .type-btn-sub{color:rgba(255,255,255,.8)}

/* 가성비 = 연두색 */
.type-btn.value-btn{border-color:var(--lime);background:var(--lime-light)}
.type-btn.value-btn .type-btn-label{color:#166534}
.type-btn.value-btn:hover{background:#dcfce7;border-color:#16a34a}
.type-btn.value-selected{border-color:var(--lime);background:var(--lime);box-shadow:0 2px 12px rgba(76,175,80,.4)}
.type-btn.value-selected .type-btn-label{color:#fff}
.type-btn.value-selected .type-btn-sub{color:rgba(255,255,255,.8)}

/* 선택된 제품 표시 */
.item-selected-prod{margin:0 15px 14px;padding:10px 13px;border-radius:11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.item-selected-prod.type-s{background:var(--yellow-light);border:1.5px solid var(--yellow)}
.item-selected-prod.type-v{background:var(--lime-light);border:1.5px solid var(--lime)}
.item-selected-prod.type-none{background:var(--bg);border:1.5px dashed var(--border)}
.sel-prod-name{font-size:12px;font-weight:700;color:var(--text)}
.sel-prod-price{font-size:11px;font-weight:600;margin-top:1px}
.item-selected-prod.type-s .sel-prod-price{color:#92620a}
.item-selected-prod.type-v .sel-prod-price{color:#166534}
.item-selected-prod.type-none .sel-prod-name{color:var(--text3);font-weight:400}
.change-prod-btn{font-size:11px;font-weight:600;color:var(--text2);border:1.5px solid var(--border);background:#fff;padding:4px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;font-family:inherit}

/* ── 제품 선택 팝업 모달 ── */
.prod-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:250;display:none;align-items:flex-end;justify-content:center}
.prod-modal-overlay.open{display:flex}
.prod-modal-box{background:#fff;width:100%;max-width:600px;max-height:90vh;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.prod-modal-handle{width:36px;height:4px;background:#e5e8eb;border-radius:99px;margin:10px auto 0}
.prod-modal-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.prod-modal-title{font-size:16px;font-weight:700}
.prod-modal-close{width:30px;height:30px;border-radius:99px;background:var(--bg);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.prod-modal-body{overflow-y:auto;flex:1;padding:16px}

/* 팝업 내 탭 */
.pm-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pm-tab{padding:10px;border-radius:11px;border:2px solid var(--border);cursor:pointer;text-align:center;font-family:inherit;font-size:12px;font-weight:700;background:#fff;transition:all .15s}
.pm-tab.act-s{border-color:var(--yellow);background:var(--yellow);color:#fff}
.pm-tab.act-v{border-color:var(--lime);background:var(--lime);color:#fff}
.pm-tab:not(.act-s):not(.act-v){color:var(--text2)}

/* 팝업 내 비교표 */
.pm-compare{background:var(--bg);border-radius:10px;overflow:hidden;margin-bottom:14px}
.pm-compare-title{font-size:11px;font-weight:700;color:var(--text2);padding:8px 12px;border-bottom:1px solid var(--border)}
.pm-compare table{width:100%;border-collapse:collapse}
.pm-compare th{font-size:11px;font-weight:700;color:var(--text2);padding:7px 10px;text-align:left;background:#edf0f3}
.pm-compare td{padding:7px 10px;font-size:12px;border-top:1px solid var(--border);vertical-align:top}
.pm-compare td:first-child{font-weight:600;color:var(--text2);white-space:nowrap;width:70px}
.rank-list{display:flex;flex-direction:column;gap:3px}
.rank-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text)}
.rank-medal{font-size:12px;width:18px;flex-shrink:0}

/* 팝업 내 제품 카드 */
.pm-prod-list{display:flex;flex-direction:column;gap:10px}
.pm-prod-card{border:2px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;transition:border-color .15s}
.pm-prod-card.sel-s{border-color:var(--yellow)}
.pm-prod-card.sel-v{border-color:var(--lime)}
.pm-prod-top{padding:13px 13px 10px;cursor:pointer}
.pm-prod-top:hover{background:#fafafa}
.pm-prod-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.pm-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.badge-s{background:var(--yellow);color:#fff}
.badge-v{background:var(--lime);color:#fff}
.pm-chk{width:20px;height:20px;border-radius:99px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.pm-prod-card.sel-s .pm-chk{background:var(--yellow);border-color:var(--yellow);color:#fff}
.pm-prod-card.sel-v .pm-chk{background:var(--lime);border-color:var(--lime);color:#fff}
.pm-prod-name{font-size:13px;font-weight:700;margin-bottom:1px}
.pm-prod-brand{font-size:11px;color:var(--text2);margin-bottom:6px}
.pm-prod-pts{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.pm-prod-pt{font-size:11px;color:var(--text2);display:flex;align-items:flex-start;gap:4px;line-height:1.45}
.dot-s{width:4px;height:4px;border-radius:99px;background:var(--yellow);margin-top:5px;flex-shrink:0}
.dot-v{width:4px;height:4px;border-radius:99px;background:var(--lime);margin-top:5px;flex-shrink:0}
.pm-price-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pm-price{font-size:15px;font-weight:900;color:var(--text)}
.pm-save{font-size:10px;color:var(--green);font-weight:600;margin-top:1px}
.pm-detail-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--text2);border:1.5px solid var(--border);background:#f8f9fa;padding:5px 10px;border-radius:8px;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;font-family:inherit}
.pm-detail-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.pm-divider{height:1px;background:var(--border);margin:0 13px}
.pm-select-area{padding:9px 13px}
.pm-select-btn{width:100%;padding:9px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.pm-sbtn-s{background:var(--yellow-light);color:#92620a}
.pm-sbtn-s:hover{background:var(--yellow);color:#fff}
.pm-prod-card.sel-s .pm-sbtn-s{background:var(--yellow);color:#fff}
.pm-sbtn-v{background:var(--lime-light);color:#166534}
.pm-sbtn-v:hover{background:var(--lime);color:#fff}
.pm-prod-card.sel-v .pm-sbtn-v{background:var(--lime);color:#fff}
.pnl{display:none}.pnl.on{display:block}

/* FINAL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;width:100%;max-width:640px;max-height:92vh;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s ease}
.modal-handle{width:36px;height:4px;background:#e5e8eb;border-radius:99px;margin:10px auto 0}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:99px;background:var(--bg);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-body{overflow-y:auto;padding:18px;flex:1}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg);border-radius:11px;padding:12px;text-align:center}
.stat-val{font-size:18px;font-weight:900}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.purchase-progress{background:var(--bg);border-radius:11px;padding:12px;margin-bottom:16px}
.purchase-progress-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;display:flex;justify-content:space-between}
.purchase-bar{height:10px;background:#e5e8eb;border-radius:99px;overflow:hidden}
.purchase-fill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);border-radius:99px;transition:width .4s}
.modal-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.modal-item:last-child{border-bottom:none}
.modal-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px}
.modal-check.checked{background:var(--blue);border-color:var(--blue);color:#fff}
.modal-item-info{flex:1;min-width:0}
.modal-item-name{font-size:13px;font-weight:600}
.modal-item-sub{font-size:11px;color:var(--text2);margin-top:1px}
.modal-item-price{font-size:13px;font-weight:700;white-space:nowrap}
.modal-item-buy{padding:6px 12px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;font-family:inherit}
.modal-item-buy:hover{background:#e67e00}
.modal-item-buy.disabled{opacity:.4;cursor:default;pointer-events:none}
.share-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
.share-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
.share-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.share-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:11px;border:1.5px solid var(--border);cursor:pointer;background:#fff;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s}
.share-btn:hover{border-color:var(--blue);color:var(--blue)}
.share-btn-icon{font-size:20px}

/* PW MODAL */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center}
.pw-overlay.open{display:flex}
.pw-box{background:#1e293b;border-radius:18px;padding:28px 24px;width:300px;max-width:90vw;animation:slideUp .2s ease}
.pw-title{font-size:17px;font-weight:700;color:#f1f5f9;text-align:center;margin-bottom:4px}
.pw-sub{font-size:12px;color:#64748b;text-align:center;margin-bottom:20px}
.pw-input{width:100%;background:#334155;border:2px solid #475569;border-radius:11px;padding:12px;font-size:15px;color:#f1f5f9;font-family:inherit;text-align:center;letter-spacing:3px;outline:none;transition:border .15s}
.pw-input:focus{border-color:var(--blue)}
.pw-input.error{border-color:#ef4444;animation:shake .3s ease}
.pw-btn{width:100%;margin-top:12px;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.pw-cancel{width:100%;margin-top:7px;padding:8px;background:transparent;color:#64748b;border:none;border-radius:11px;font-size:12px;cursor:pointer;font-family:inherit}
.pw-error{font-size:12px;color:#ef4444;text-align:center;margin-top:6px;min-height:16px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ADMIN */
.admin-overlay{position:fixed;inset:0;background:#0f172a;z-index:300;display:none;flex-direction:column;overflow-y:auto}
.admin-overlay.open{display:flex}
.admin-inner{max-width:960px;margin:0 auto;padding:28px 20px;width:100%}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.admin-title{font-size:20px;font-weight:700;color:#f1f5f9}
.admin-close{padding:7px 16px;background:#334155;color:#94a3b8;border:none;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.admin-stat{background:#1e293b;border-radius:13px;padding:18px}
.admin-stat-val{font-size:26px;font-weight:900;color:#f1f5f9}
.admin-stat-label{font-size:12px;color:#64748b;margin-top:3px}
.admin-section-title{font-size:14px;font-weight:700;color:#94a3b8;margin-bottom:10px}
.admin-table-wrap{background:#1e293b;border-radius:13px;overflow:hidden;margin-bottom:20px}
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{background:#0f172a;color:#64748b;font-size:11px;font-weight:600;padding:9px 14px;text-align:left;border-bottom:1px solid #334155}
.admin-table td{padding:9px 14px;font-size:11px;color:#cbd5e1;border-bottom:1px solid #1e293b}
.admin-table tr:last-child td{border-bottom:none}

    if(logoTapCount>=5){logoTapCount=0;openAdmin();}
    else logoTapTimer=setTimeout(function(){logoTapCount=0;},2000);
  });
  if(window.location.search.indexOf('admin')!==-1) window.addEventListener('load',function(){openAdmin();});
  // 제품 모달 닫기
  document.getElementById('prodModalClose').addEventListener('click',closeProdModal);
  document.getElementById('prodModalOverlay').addEventListener('click',function(e){if(e.target===document.getElementById('prodModalOverlay'))closeProdModal();});
  // 최종 모달 닫기
  document.getElementById('finalModalClose').addEventListener('click',closeFinalModal);
  document.getElementById('finalModalOverlay').addEventListener('click',function(e){if(e.target===document.getElementById('finalModalOverlay'))closeFinalModal();});
}

function loadFromStorage(){
  try{
    var s=localStorage.getItem('planner_v3');
    if(s){var p=JSON.parse(s);state.selections=p.selections||{};state.excluded=p.excluded||{};state.answers=p.answers||{};state.purchased=p.purchased||{};}
    var lnk=localStorage.getItem('planner_links_v3');
    if(lnk)state.coupangLinks=JSON.parse(lnk);
    var st=localStorage.getItem('planner_stats');
    if(st)state.adminStats=JSON.parse(st);
  }catch(e){}
}
function saveToStorage(){
  try{
    localStorage.setItem('planner_v3',JSON.stringify({selections:state.selections,excluded:state.excluded,answers:state.answers,purchased:state.purchased}));
    state.adminStats.saves=(state.adminStats.saves||0)+1;
    localStorage.setItem('planner_stats',JSON.stringify(state.adminStats));
  }catch(e){}
}
function trackVisit(){try{state.adminStats.visitors=(state.adminStats.visitors||0)+1;localStorage.setItem('planner_stats',JSON.stringify(state.adminStats));}catch(e){}}
function trackClick(){try{state.adminStats.clicks=(state.adminStats.clicks||0)+1;localStorage.setItem('planner_stats',JSON.stringify(state.adminStats));}catch(e){}}

function isItemVisible(item){
  if(!item.conditional)return true;
  if(item.conditional==='breastfeed'){var a=state.answers['feeding_type'];if(!a)return true;return a==='breastfeed'||a==='mixed';}
  if(item.conditional==='winter'){var b=state.answers['season'];if(!b)return true;return b==='winter';}
  if(item.conditional==='outing_active'){var c=state.answers['outing'];if(!c)return true;return c==='active'||c==='medium';}
  if(item.conditional==='car'){var d=state.answers['car'];if(!d)return true;return d==='yes';}
  return true;
}

function getSelPrice(item){
  var sel=state.selections[item.id];
  if(!sel)return item.steady[0].price; // 미선택이면 스테디 1위 기준
  var prods=sel.type==='s'?item.steady:item.value;
  return prods[sel.idx].price;
}
function getSteadyBase(item){return item.steady[0].price;}

function calcTotals(){
  var st=0,my=0;
  ITEMS.forEach(function(item){
    if(!isItemVisible(item)||state.excluded[item.id])return;
    st+=getSteadyBase(item);
    my+=getSelPrice(item);
  });
  return{steadyTotal:st,myTotal:my,save:st-my};
}

function fmtPrice(n){
  if(n>=10000){var m=Math.floor(n/10000),r=n%10000;return r===0?m+'만원':m+'만 '+r.toLocaleString()+'원';}
  return n.toLocaleString()+'원';
}

function getDispName(itemId,type,idx,fallback){
  return state.coupangLinks[itemId+'_'+type+idx+'_name']||fallback;
}
function getLink(itemId,type,idx){
  return state.coupangLinks[itemId+'_'+type+idx]||'';
}

// ── RENDER ALL ──
function renderAll(){renderBudget();renderAccordion();renderCategoryChips();renderItems();renderProgress();}

function renderBudget(){
  var t=calcTotals();
  document.getElementById('currentTotal').textContent=fmtPrice(t.myTotal);
  document.getElementById('saveAmount').textContent=t.save>0?fmtPrice(t.save):'0원';
  document.getElementById('steadyTotalLabel').textContent=fmtPrice(t.steadyTotal);
  document.getElementById('myTotalLabel').textContent=fmtPrice(t.myTotal);
  var pct=t.steadyTotal>0?Math.round(t.myTotal/t.steadyTotal*100):100;
  document.getElementById('steadyBar').style.width='100%';
  document.getElementById('myBar').style.width=pct+'%';
}
function renderProgress(){
  var total=ITEMS.filter(function(i){return isItemVisible(i);}).length;
  var done=ITEMS.filter(function(i){return isItemVisible(i)&&state.purchased[i.id];}).length;
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent='구매 완료 '+pct+'%';
  document.getElementById('progressCount').textContent=done+' / '+total+'개';
}

function renderAccordion(){
  var wrap=document.getElementById('accordionWrap'),html='';
  QUESTIONS.forEach(function(q,idx){
    var ans=state.answers[q.id],ansLabel='';
    if(ans){var f=q.options.find(function(o){return o.v===ans;});if(f)ansLabel='<span class="accordion-q-check">✔ '+f.l+'</span>';}
    html+='<div class="accordion-item">';
    html+='<div class="accordion-head" onclick="toggleAccordion('+idx+')">';
    html+='<div class="accordion-head-left"><span class="accordion-q-num">'+(idx+1)+'</span><span class="accordion-q-text">'+q.label+'</span>'+ansLabel+'</div>';
    html+='<span class="accordion-arrow" id="arrow'+idx+'">▼</span></div>';
    html+='<div class="accordion-body" id="abody'+idx+'">';
    html+='<div class="q-options">';
    q.options.forEach(function(opt){
      var sel=state.answers[q.id]===opt.v?' selected':'';
      html+='<div class="q-opt'+sel+'" onclick="selectAnswer(\''+q.id+'\',\''+opt.v+'\','+idx+')">'+opt.l+'</div>';
    });
    html+='</div>';
    if(q.hint)html+='<div class="q-hint">💡 '+q.hint+'</div>';
    html+='</div></div>';
  });
  wrap.innerHTML=html;
}
function toggleAccordion(idx){
  var body=document.getElementById('abody'+idx),arrow=document.getElementById('arrow'+idx);
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);arrow.classList.toggle('open',!open);
}
function selectAnswer(qid,val,idx){state.answers[qid]=val;saveToStorage();renderAll();}

function renderCategoryChips(){
  var wrap=document.getElementById('categoryChips'),html='';
  CATEGORIES.forEach(function(cat){
    var count=cat.id==='all'?ITEMS.filter(function(i){return isItemVisible(i);}).length:ITEMS.filter(function(i){return i.cat===cat.id&&isItemVisible(i);}).length;
    var active=state.activeCategory===cat.id?' active':'';
    html+='<div class="chip'+active+'" onclick="setCategory(\''+cat.id+'\')">'+cat.emoji+' '+cat.label+' <span class="chip-count">('+count+')</span></div>';
  });
  wrap.innerHTML=html;
}
function setCategory(catId){state.activeCategory=catId;renderCategoryChips();renderItems();}

function renderItems(){
  var grid=document.getElementById('itemsGrid');
  var filtered=ITEMS.filter(function(item){
    if(!isItemVisible(item))return false;
    if(state.activeCategory!=='all'&&item.cat!==state.activeCategory)return false;
    return true;
  });
  if(filtered.length===0){grid.innerHTML='<div class="empty-state"><div class="empty-state-icon">🔍</div><div>조건에 맞는 아이템이 없어요</div></div>';return;}
  grid.innerHTML=filtered.map(buildItemCard).join('');
}

function getCatLabel(cat){var f=CATEGORIES.find(function(c){return c.id===cat;});return f?f.emoji+' '+f.label:cat;}

function buildItemCard(item){
  var excluded=!!state.excluded[item.id];
  var sel=state.selections[item.id]||null;
  var excLabel=excluded?'↩ 복원':'− 제외';
  var excClass=excluded?'item-exclude-btn restore':'item-exclude-btn';

  var html='<div class="item-card'+(excluded?' excluded':'')+'" id="card-'+item.id+'">';
  // 헤더
  html+='<div class="item-card-head">';
  html+='<span class="item-cat-badge cat-'+item.cat+'">'+getCatLabel(item.cat)+'</span>';
  html+='<span class="item-name-head">'+item.name+'</span>';
  if(item.conditional)html+='<span style="font-size:11px;color:var(--orange);margin-right:4px">📌</span>';
  html+='<button class="'+excClass+'" onclick="toggleExclude(\''+item.id+'\')">'+excLabel+'</button>';
  html+='</div>';

  // 선택된 제품 표시 (선택 후에만)
  if(sel){
    var prods=sel.type==='s'?item.steady:item.value;
    var prod=prods[sel.idx];
    var dispName=getDispName(item.id,sel.type,sel.idx,prod.name);
    var barClass=sel.type==='s'?'item-selected-prod type-s':'item-selected-prod type-v';
    var selIcon=sel.type==='s'?'👑':'💡';
    html+='<div class="'+barClass+'">';
    html+='<div><div class="sel-prod-name">'+selIcon+' '+dispName+'</div>';
    html+='<div class="sel-prod-price">'+fmtPrice(prod.price)+' 선택됨</div></div>';
    html+='<button class="change-prod-btn" onclick="openProdModal(\''+item.id+'\',\''+sel.type+'\')">변경하기 ✏️</button>';
    html+='</div>';
  }

  // 스테디 / 가성비 선택 버튼
  html+='<div class="item-type-btns">';

  // 스테디 버튼 (노란색)
  var sBtnClass='type-btn steady-btn'+(sel&&sel.type==='s'?' steady-selected':'');
  var sSubText=sel&&sel.type==='s'?getDispName(item.id,'s',sel.idx,item.steady[sel.idx].name):'3개 비교 후 선택';
  html+='<button class="'+sBtnClass+'" onclick="openProdModal(\''+item.id+'\',\'s\')">';
  html+='<span class="type-btn-icon">👑</span>';
  html+='<span class="type-btn-label">스테디셀러</span>';
  html+='<span class="type-btn-sub">'+sSubText+'</span>';
  html+='</button>';

  // 가성비 버튼 (연두색)
  var vBtnClass='type-btn value-btn'+(sel&&sel.type==='v'?' value-selected':'');
  var vSubText=sel&&sel.type==='v'?getDispName(item.id,'v',sel.idx,item.value[sel.idx].name):'3개 비교 후 선택';
  html+='<button class="'+vBtnClass+'" onclick="openProdModal(\''+item.id+'\',\'v\')">';
  html+='<span class="type-btn-icon">💡</span>';
  html+='<span class="type-btn-label">가성비</span>';
  html+='<span class="type-btn-sub">'+vSubText+'</span>';
  html+='</button>';

  html+='</div>';
  html+='</div>';
  return html;
}

function toggleExclude(itemId){
  state.excluded[itemId]=!state.excluded[itemId];
  saveToStorage();renderBudget();renderProgress();renderCategoryChips();
  var item=ITEMS.find(function(i){return i.id===itemId;});
  if(item){var card=document.getElementById('card-'+itemId);if(card){var tmp=document.createElement('div');tmp.innerHTML=buildItemCard(item);card.replaceWith(tmp.firstChild);}}
}

// ── 제품 선택 팝업 모달 ──
function openProdModal(itemId,tab){
  currentModalItemId=itemId;
  currentModalTab=tab;
  var item=ITEMS.find(function(i){return i.id===itemId;});
  if(!item)return;
  document.getElementById('prodModalTitle').textContent=item.name+' 제품 선택';
  renderProdModal();
  document.getElementById('prodModalOverlay').classList.add('open');
}
function closeProdModal(){
  document.getElementById('prodModalOverlay').classList.remove('open');
  currentModalItemId=null;
}
function switchProdModalTab(tab){
  currentModalTab=tab;
  renderProdModal();
}

function renderProdModal(){
  var itemId=currentModalItemId;
  var tab=currentModalTab;
  var item=ITEMS.find(function(i){return i.id===itemId;});
  if(!item)return;
  var sel=state.selections[itemId]||null;
  var html='';

  // 탭
  html+='<div class="pm-tabs">';
  html+='<button class="pm-tab'+(tab==='s'?' act-s':'')+'" onclick="switchProdModalTab(\'s\')">👑 스테디셀러 3개</button>';
  html+='<button class="pm-tab'+(tab==='v'?' act-v':'')+'" onclick="switchProdModalTab(\'v\')">💡 가성비 3개</button>';
  html+='</div>';

  // 비교표
  var cmpData=tab==='s'?item.compare.s:item.compare.v;
  var cmpProds=tab==='s'?item.steady:item.value;
  html+='<div class="pm-compare">';
  html+='<div class="pm-compare-title">📊 '+(tab==='s'?'스테디셀러':'가성비')+' 항목별 비교</div>';
  html+='<table><thead><tr><th>항목</th><th>1위 → 2위 → 3위</th></tr></thead><tbody>';
  cmpData.forEach(function(row){
    html+='<tr><td>'+row.icon+' '+row.key+'</td><td>';
    html+='<div class="rank-list">';
    html+='<div class="rank-item"><span class="rank-medal">🥇</span>'+getDispName(itemId,tab,0,cmpProds[0].name)+'</div>';
    html+='<div class="rank-item"><span class="rank-medal">🥈</span>'+getDispName(itemId,tab,1,cmpProds[1].name)+'</div>';
    html+='<div class="rank-item"><span class="rank-medal">🥉</span>'+getDispName(itemId,tab,2,cmpProds[2].name)+'</div>';
    html+='</div></td></tr>';
  });
  html+='</tbody></table></div>';

  // 제품 카드 3개
  html+='<div class="pm-prod-list">';
  var prods=tab==='s'?item.steady:item.value;
  prods.forEach(function(prod,i){
    var isSelected=sel&&sel.type===tab&&sel.idx===i;
    var cardClass='pm-prod-card'+(isSelected?(tab==='s'?' sel-s':' sel-v'):'');
    var badgeClass=tab==='s'?'badge-s':'badge-v';
    var badgeLabel=(tab==='s'?'👑 스테디':'💡 가성비')+' '+(i+1)+'위';
    var dotClass=tab==='s'?'dot-s':'dot-v';
    var dispName=getDispName(itemId,tab,i,prod.name);
    var link=getLink(itemId,tab,i);
    var saveAmt=tab==='v'?(getSteadyBase(item)-prod.price):0;
    var btnClass=tab==='s'?'pm-select-btn pm-sbtn-s':'pm-select-btn pm-sbtn-v';
    var btnLabel=isSelected?'✅ 선택됨':'이 제품으로 선택';

    html+='<div class="'+cardClass+'">';
    html+='<div class="pm-prod-top" onclick="selectProdInModal(\''+itemId+'\',\''+tab+'\','+i+')">';
    html+='<div class="pm-prod-head"><span class="pm-badge '+badgeClass+'">'+badgeLabel+'</span><div class="pm-chk">'+(isSelected?'✓':'')+'</div></div>';
    html+='<div class="pm-prod-name">'+dispName+'</div>';
    html+='<div class="pm-prod-brand">'+prod.brand+'</div>';
    html+='<div class="pm-prod-pts">';
    prod.pts.forEach(function(pt){html+='<div class="pm-prod-pt"><span class="'+dotClass+'"></span>'+pt+'</div>';});
    html+='</div>';
    html+='<div class="pm-price-row">';
    html+='<div><div class="pm-price">'+fmtPrice(prod.price)+'</div>';
    if(saveAmt>0)html+='<div class="pm-save">👑 대비 '+fmtPrice(saveAmt)+' 절약</div>';
    html+='</div>';
    if(link){
      html+='<a href="'+link+'" target="_blank" class="pm-detail-btn" onclick="trackClick()">🔍 상세 정보 보기</a>';
    }else{
      html+='<span class="pm-detail-btn" style="opacity:.35;cursor:default">🔍 상세 정보 보기</span>';
    }
    html+='</div></div>';
    html+='<div class="pm-divider"></div>';
    html+='<div class="pm-select-area"><button class="'+btnClass+'" onclick="selectProdInModal(\''+itemId+'\',\''+tab+'\','+i+')">'+btnLabel+'</button></div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('prodModalBody').innerHTML=html;
}

function selectProdInModal(itemId,type,idx){
  state.selections[itemId]={type:type,idx:idx};
  saveToStorage();
  renderBudget();
  // 카드 업데이트
  var item=ITEMS.find(function(i){return i.id===itemId;});
  if(item){var card=document.getElementById('card-'+itemId);if(card){var tmp=document.createElement('div');tmp.innerHTML=buildItemCard(item);card.replaceWith(tmp.firstChild);}}
  // 팝업 업데이트
  renderProdModal();
  var prods=type==='s'?item.steady:item.value;
  showToast((type==='s'?'👑 ':'💡 ')+getDispName(itemId,type,idx,prods[idx].name)+' 선택됨!');
}

// ── 최종 목록 모달 ──
function openFinalModal(){document.getElementById('finalModalOverlay').classList.add('open');renderFinalModal();}
function closeFinalModal(){document.getElementById('finalModalOverlay').classList.remove('open');}

function renderFinalModal(){
  var t=calcTotals();

  var done=activeItems.filter(function(i){return state.purchased[i.id];}).length;
  var pct=activeItems.length>0?Math.round(done/activeItems.length*100):0;
  var html='';
  html+='<div class="modal-stats">';
  html+='<div class="stat-card"><div class="stat-val">'+activeItems.length+'</div><div class="stat-label">총 아이템</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="font-size:14px">'+fmtPrice(t.myTotal)+'</div><div class="stat-label">최종 예산</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="color:var(--orange);font-size:14px">'+fmtPrice(t.save)+'</div><div class="stat-label">절약 금액</div></div>';
  html+='</div>';
  html+='<div class="purchase-progress"><div class="purchase-progress-label"><span>🛒 구매 진행률</span><span>'+done+'/'+activeItems.length+'개</span></div><div class="purchase-bar"><div class="purchase-fill" style="width:'+pct+'%"></div></div></div>';

      var prods=sel.type==='s'?item.steady:item.value;
      prod=prods[sel.idx];
      dispName=getDispName(item.id,sel.type,sel.idx,prod.name);
      selIcon=sel.type==='s'?'👑':'💡';
    }else{
      prod=item.steady[0];dispName=getDispName(item.id,'s',0,prod.name);selIcon='👑';
    }
    var isPurchased=!!state.purchased[item.id];
    var link=sel?getLink(item.id,sel.type,sel.idx):'';
    html+='<div class="modal-item">';

    html+='<div class="modal-item-info"><div class="modal-item-name">'+item.name+'</div><div class="modal-item-sub">'+selIcon+' '+dispName+' · '+prod.brand+'</div></div>';
    html+='<div class="modal-item-price">'+fmtPrice(prod.price)+'</div>';
    if(link){html+='<a href="'+link+'" target="_blank" class="modal-item-buy" onclick="trackClick()">🛒 구매하기</a>';}
    else{html+='<button class="modal-item-buy disabled">🛒 구매하기</button>';}
    html+='</div>';
  });
  html+='<div class="share-section"><div class="share-title">📤 목록 공유하기</div><div class="share-btns">';
  html+='<div class="share-btn" onclick="shareKakao()"><div class="share-btn-icon">💬</div>카카오톡</div>';
  html+='<div class="share-btn" onclick="shareSMS()"><div class="share-btn-icon">📱</div>문자</div>';
  html+='<div class="share-btn" onclick="shareInsta()"><div class="share-btn-icon">📸</div>인스타</div>';
  html+='<div class="share-btn" onclick="copyLink()"><div class="share-btn-icon">🔗</div>링크복사</div>';
  html+='</div>';
  html+='<div style="margin-top:10px"><button class="btn" style="width:100%;justify-content:center;border:1.5px solid var(--border);color:var(--text2);background:#fff" onclick="showSaveHint()">📷 이미지 저장</button></div></div>';
  document.getElementById('finalModalBody').innerHTML=html;
}
function togglePurchased(itemId){state.purchased[itemId]=!state.purchased[itemId];saveToStorage();renderFinalModal();renderProgress();}

// SHARE
function getShareText(){
  var t=calcTotals();
  var lines=['👶 출산준비물 목록 (총 '+fmtPrice(t.myTotal)+' | 절약 '+fmtPrice(t.save)+')'];
  ITEMS.forEach(function(item){
    if(!isItemVisible(item)||state.excluded[item.id])return;
    var sel=state.selections[item.id]||null;
    var prod=sel?(sel.type==='s'?item.steady:item.value)[sel.idx]:item.steady[0];
    var n=sel?getDispName(item.id,sel.type,sel.idx,prod.name):getDispName(item.id,'s',0,prod.name);
    lines.push('• '+item.name+': '+n+' '+fmtPrice(prod.price));
  });
  lines.push('\n출산준비물 플래너에서 만들었어요 🎀');
  return lines.join('\n');
}
function shareKakao(){if(navigator.share){navigator.share({title:'출산준비물 목록',text:getShareText()}).catch(function(){});}else{copyText(getShareText());showToast('📋 복사됨! 카카오톡에 붙여넣기 하세요');}}
function shareSMS(){window.open('sms:?body='+encodeURIComponent(getShareText()));}
function shareInsta(){copyText(getShareText());showToast('📋 복사됨! 인스타에 붙여넣기 하세요');}
function copyLink(){copyText(window.location.href);showToast('🔗 링크 복사됨!');}
function copyText(t){if(navigator.clipboard){navigator.clipboard.writeText(t).catch(function(){fb(t)});}else{fb(t);}}
function fb(t){var e=document.createElement('textarea');e.value=t;e.style.position='fixed';e.style.opacity='0';document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);}
function showSaveHint(){showToast('📱 꾹 눌러서 스크린샷으로 저장해주세요 (전원+볼륨 다운)');}

// ADMIN
var ADMIN_PW='baby2024!';
function openAdmin(){document.getElementById('pwInput').value='';document.getElementById('pwError').textContent='';document.getElementById('pwInput').classList.remove('error');document.getElementById('pwOverlay').classList.add('open');setTimeout(function(){document.getElementById('pwInput').focus();},100);}
function closePwModal(){document.getElementById('pwOverlay').classList.remove('open');}
function checkAdminPw(){
  var val=document.getElementById('pwInput').value;
  if(val===ADMIN_PW){closePwModal();document.getElementById('adminOverlay').classList.add('open');renderAdminStats();renderAdminTable();}
  else{var inp=document.getElementById('pwInput'),err=document.getElementById('pwError');inp.classList.add('error');err.textContent='❌ 비밀번호가 틀렸어요';inp.value='';setTimeout(function(){inp.classList.remove('error');},400);}
}
function closeAdmin(){document.getElementById('adminOverlay').classList.remove('open');}
function renderAdminStats(){
  var s=state.adminStats;
  document.getElementById('adminStats').innerHTML=
    '<div class="admin-stat"><div class="admin-stat-val">'+(s.visitors||0)+'</div><div class="admin-stat-label">총 방문자</div></div>'+
    '<div class="admin-stat"><div class="admin-stat-val">'+(s.clicks||0)+'</div><div class="admin-stat-label">쿠팡 클릭</div></div>'+
    '<div class="admin-stat"><div class="admin-stat-val">'+(s.saves||0)+'</div><div class="admin-stat-label">저장 횟수</div></div>';
}
function renderAdminTable(){
  var html='';
  ITEMS.forEach(function(item){
    ['s','v'].forEach(function(t){
      var prods=t==='s'?item.steady:item.value;
      prods.forEach(function(prod,i){
        var key=item.id+'_'+t+i;
        var link=state.coupangLinks[key]||'';
        var name=state.coupangLinks[key+'_name']||prod.name;
        var typeLabel=t==='s'?'<span style="color:#fbbf24">👑 스테디 '+(i+1)+'위</span>':'<span style="color:#86efac">💡 가성비 '+(i+1)+'위</span>';
        html+='<tr><td style="font-weight:600;color:#f1f5f9">'+item.name+'</td><td>'+typeLabel+'</td>';
        html+='<td><input type="text" value="'+escAttr(name)+'" id="name-'+key+'"></td>';
        html+='<td><input type="text" value="'+escAttr(link)+'" id="link-'+key+'" placeholder="https://link.coupang.com/..."></td></tr>';
      });
    });
  });
  document.getElementById('adminTableBody').innerHTML=html;
}
function escAttr(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function saveAdminLinks(){
  ITEMS.forEach(function(item){
    ['s','v'].forEach(function(t){
      [0,1,2].forEach(function(i){
        var key=item.id+'_'+t+i;
        var lEl=document.getElementById('link-'+key);
        var nEl=document.getElementById('name-'+key);
        if(lEl)state.coupangLinks[key]=lEl.value.trim();
        if(nEl&&nEl.value.trim())state.coupangLinks[key+'_name']=nEl.value.trim();
      });
    });
  });
  try{localStorage.setItem('planner_links_v3',JSON.stringify(state.coupangLinks));}catch(e){}
  renderItems();
  showToast('✅ 저장됐어요!');
}
function exportCSV(){
  var rows=[['아이템','타입','순위','상품명','브랜드','가격','쿠팡URL']];
  ITEMS.forEach(function(item){
    ['s','v'].forEach(function(t){
      var prods=t==='s'?item.steady:item.value;
      prods.forEach(function(prod,i){
        var key=item.id+'_'+t+i;
        rows.push([item.name,t==='s'?'스테디':'가성비',i+1,state.coupangLinks[key+'_name']||prod.name,prod.brand,prod.price,state.coupangLinks[key]||'']);
      });
    });
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='planner_links.csv';a.click();
  showToast('📥 CSV 다운로드됐어요!');
}

function showToast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

init();
</script>
